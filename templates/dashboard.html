{% extends "base.html" %}
{% block title %}Dashboard — Lens League Apex{% endblock %}

{% block extra_css %}
<style>
  .dash-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 36px;
  }
</style>
{% endblock %}

{% block content %}

<!-- RAW card link -->
<div>
  <a href="mailto:{{ contact_email }}?subject=RAW%20File%20%E2%80%94%20{{ img.asset_name | urlencode }}&body=Hi%2C%0A%0APlease%20find%20attached%20the%20RAW%20file%20for%20my%20image%20'%20img.asset_name%20'%20(Image%20ID%3A%20{{ img.id }}).%0A%0AThank%20you."
     style="color:var(--gold); text-decoration:underline; font-weight:600;"
     onclick="event.stopPropagation();">Click here to submit RAW →</a>
</div>

{% endblock %}
