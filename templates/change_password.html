{% extends "base.html" %}
{% block title %}Change Password — Lens League Apex{% endblock %}
{% block content %}
<div style="max-width:440px; margin:60px auto;">
  <div class="page-header">
    <h1>Change Password</h1>
    <p>Update your account password</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" required minlength="8">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-solid"
              style="width:100%; padding:14px; font-size:12px; margin-top:8px;">
        Update Password
      </button>
    </form>
    <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-dim);">
      <a href="{{ url_for('dashboard') }}" style="color:var(--gold);">← Back to Dashboard</a>
    </p>
  </div>
</div>
{% endblock %}
