{% extends "base.html" %}
{% block title %}Login — Lens League Apex{% endblock %}

{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:40px 0;">
  <div style="width:100%; max-width:440px;">

    <!-- Brand mark -->
    <div style="text-align:center; margin-bottom:40px;">
      <div style="font-family:var(--font-mono); font-size:14px; letter-spacing:4px; color:var(--gold); margin-bottom:12px;">APEX DDI ENGINE</div>
      <h1 style="font-size:28px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">Welcome Back</h1>
      <p style="font-size:17px; color:var(--text-secondary);">Access your photographer dashboard</p>
    </div>

    <div class="card">
      <form method="POST" action="{{ url_for('login') }}">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com"
                 value="{{ request.form.get('email', '') }}"
                 required autocomplete="email" autofocus>
        </div>

        <div class="form-group" style="margin-bottom:8px;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Your password"
                 required autocomplete="current-password">
        </div>

        <div style="text-align:right; margin-bottom:24px;">
          <a href="{{ url_for('forgot_password') }}"
             style="font-size:15px; color:var(--text-muted); text-decoration:none; transition:color 0.2s;"
             onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="btn btn-solid" style="width:100%; padding:14px; font-size:15px; letter-spacing:2px;">
          Login
        </button>
      </form>

      <div style="border-top:1px solid var(--border-subtle); margin-top:28px; padding-top:24px; text-align:center;">
        <p style="font-size:17px; color:var(--text-secondary);">
          Don't have an account?
          <a href="{{ url_for('register') }}"
             style="color:var(--gold); font-weight:600; text-decoration:none; margin-left:4px;">
            Join Free →
          </a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
