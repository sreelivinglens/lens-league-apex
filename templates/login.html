{% extends "base.html" %}
{% block title %}Login — Lens League Apex{% endblock %}
{% block content %}
<div style="max-width:440px; margin:60px auto;">
  <div class="page-header">
    <h1>Login</h1>
    <p>Access your photographer dashboard</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-solid" style="width:100%; padding:14px; font-size:12px; margin-top:8px;">Login</button>
    </form>
    <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-dim);">
      No account? <a href="{{ url_for('register') }}" style="color:var(--gold);">Join free</a>
    </p>
  </div>
</div>
{% endblock %}
