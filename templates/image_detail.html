{% extends "base.html" %}
{% block title %}{{ image.asset_name or 'Image' }} — Lens League Apex{% endblock %}

{% block extra_css %}
<style>
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .detail-header .page-header { margin-bottom: 0; flex: 1; min-width: 0; }
</style>
<!-- Delete confirmation modal -->
<div id="delete-modal" style="display:none; position:fixed; inset:0;">
</div>
{% endblock %}

% block content %}

<!-- Header -->
<div class="detail-header">
  <div class="page-header">
    <h1>{{ image.asset_name or image.original_filename }}</h1>
  </div>
</div>

<!-- RAW request banner -->
<a href="mailto:{{ contact_email }}?subject=RAW%20File%20—%20{{ image.asset_name | urlencode }}&body=Hi%2C%0A%0APlease%20find%20attached%20the%20RAW%20file%20for%20my%20image%20'%7B%7B%20image.asset_name%20|%20urlencode%20%7D%7D%27%20(Image%20ID%3A%20%7B%7B%20image.id%20%7D%7D).%0A%0AThank%20you."
   style="display:inline-block; padding:9px 20px; background:var(--gold); color:#000; text-decoration:none;">
  📧 Submit RAW File to {{ contact_email }} →
</a>
{% endblock %}
