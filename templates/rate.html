{% extends "base.html" %}
{% block title %}Rate Images — Lens League Apex{% endblock %}

{% block extra_css %}
<style>
  .rate-wrap { max-width: 720px; margin: 0 auto; }
</style>
{% endblock %}

{% block content %}

  <div class="page-header"><h1>Rate Images</h1></div>

  </p>
</div>
{% endblock %}
